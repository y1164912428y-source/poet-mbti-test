<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗人 × MBTI 交叉解读</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f5f0e6;
            --bg-dark: #2c2c2c;
            --accent-red: #c94043;
            --accent-green: #4a7c59;
            --accent-gold: #b8860b;
            --text-dark: #333;
            --text-light: #666;
            --border-color: #d4c5a9;
            --shadow: rgba(0,0,0,0.1);
            --nt-purple: #8b5cf6;
            --nf-green: #22c55e;
            --sj-blue: #3b82f6;
            --sp-yellow: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-paper);
            color: var(--text-dark);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(201,64,67,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(74,124,89,0.03) 0%, transparent 50%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 50px,
                    rgba(212,197,169,0.1) 50px,
                    rgba(212,197,169,0.1) 51px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(212,197,169,0.1) 50px,
                    rgba(212,197,169,0.1) 51px
                );
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        header h1 span {
            color: var(--accent-red);
        }

        header .subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 15px;
            line-height: 1.8;
        }

        header .hint {
            font-size: 0.95rem;
            color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(184,134,11,0.1), rgba(201,64,67,0.1));
            padding: 12px 24px;
            border-radius: 25px;
            display: inline-block;
            border: 1px dashed var(--border-color);
        }

        /* 诗人卡片网格 */
        .poets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            padding: 20px 0;
        }

        .poet-card {
            background: linear-gradient(145deg, #fff 0%, var(--bg-paper) 100%);
            border-radius: 16px;
            padding: 20px;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .poet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-gold), var(--accent-green));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .poet-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border-color: var(--accent-gold);
        }

        .poet-card:hover::before {
            opacity: 1;
        }

        .poet-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            border: 3px solid var(--border-color);
            overflow: hidden;
        }

        .poet-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poet-code {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-red);
            text-align: center;
            margin-bottom: 5px;
        }

        .poet-name {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .poet-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .poet-tag {
            font-size: 0.75rem;
            padding: 3px 10px;
            background: rgba(201,64,67,0.1);
            color: var(--accent-red);
            border-radius: 12px;
            border: 1px solid rgba(201,64,67,0.2);
        }

        .view-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-red), #a83239);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: linear-gradient(135deg, #a83239, var(--accent-red));
            transform: scale(1.02);
        }

        /* 详情页样式 */
        .detail-page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .detail-page.active {
            display: block;
        }

        .home-page.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 面包屑导航 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--accent-red);
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb a:hover {
            color: var(--accent-gold);
            text-decoration: underline;
        }

        .breadcrumb span {
            color: var(--border-color);
        }

        /* 诗人详情头部 */
        .poet-detail-header {
            display: flex;
            gap: 30px;
            align-items: center;
            background: linear-gradient(135deg, #fff, var(--bg-paper));
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            margin-bottom: 40px;
            box-shadow: 0 4px 25px var(--shadow);
        }

        .poet-detail-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent-gold);
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .poet-detail-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poet-detail-info {
            flex: 1;
        }

        .poet-detail-code {
            font-size: 1.2rem;
            color: var(--accent-red);
            margin-bottom: 5px;
        }

        .poet-detail-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .poet-detail-desc {
            font-size: 1.1rem;
            color: var(--text-light);
            line-height: 1.8;
            padding: 15px;
            background: rgba(201,64,67,0.05);
            border-left: 4px solid var(--accent-red);
            border-radius: 0 10px 10px 0;
        }

        /* MBTI组合网格 */
        .mbti-section-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--text-dark);
            text-align: center;
            margin: 40px 0 30px;
            position: relative;
        }

        .mbti-section-title::before,
        .mbti-section-title::after {
            content: '◆';
            margin: 0 15px;
            color: var(--accent-gold);
        }

        /* MBTI分组标签 */
        .mbti-group-labels {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .mbti-group-label {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .mbti-group-label.nt {
            background: rgba(139,92,246,0.15);
            color: var(--nt-purple);
            border: 1px solid rgba(139,92,246,0.3);
        }

        .mbti-group-label.nf {
            background: rgba(34,197,94,0.15);
            color: var(--nf-green);
            border: 1px solid rgba(34,197,94,0.3);
        }

        .mbti-group-label.sj {
            background: rgba(59,130,246,0.15);
            color: var(--sj-blue);
            border: 1px solid rgba(59,130,246,0.3);
        }

        .mbti-group-label.sp {
            background: rgba(245,158,11,0.15);
            color: var(--sp-yellow);
            border: 1px solid rgba(245,158,11,0.3);
        }

        .mbti-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .mbti-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border: 2px solid var(--border-color);
            box-shadow: 0 3px 15px var(--shadow);
            transition: all 0.3s ease;
        }

        .mbti-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        .mbti-card.nt { border-top: 4px solid var(--nt-purple); }
        .mbti-card.nf { border-top: 4px solid var(--nf-green); }
        .mbti-card.sj { border-top: 4px solid var(--sj-blue); }
        .mbti-card.sp { border-top: 4px solid var(--sp-yellow); }

        .mbti-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .mbti-card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .mbti-card-title span {
            color: var(--accent-red);
        }

        .mbti-stars {
            color: var(--accent-gold);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .mbti-stars .empty {
            color: #ddd;
        }

        .mbti-combo-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(184,134,11,0.08);
            border-radius: 8px;
            text-align: center;
        }

        .mbti-combo-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.7;
        }

        /* 返回按钮 */
        .back-btn {
            display: block;
            width: 200px;
            margin: 50px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--bg-dark), #444);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #444, var(--bg-dark));
            transform: scale(1.05);
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 1px solid var(--border-color);
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .poet-detail-header {
                flex-direction: column;
                text-align: center;
            }

            .poet-detail-avatar {
                width: 120px;
                height: 120px;
            }

            .poet-detail-desc {
                text-align: left;
            }

            .mbti-group-labels {
                grid-template-columns: repeat(2, 1fr);
            }

            .poets-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            header h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            header .subtitle {
                font-size: 0.95rem;
            }

            .poet-card {
                padding: 15px;
            }

            .mbti-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 图片占位符 */
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="home-page" id="homePage">
            <header>
                <h1>诗人 <span>×</span> MBTI 交叉解读</h1>
                <p class="subtitle">20种诗人人格 × 16种MBTI = 320种独特人格组合<br>探索你的诗人人格与 MBTI 类型碰撞后的化学反应</p>
                <p class="hint">选择一位诗人，查看 16 种 MBTI 交叉解读</p>
            </header>
            <div class="poets-grid" id="poetsGrid"></div>
        </div>

        <div class="detail-page" id="detailPage">
            <div class="breadcrumb">
                <a href="#" onclick="showHome()">首页</a>
                <span>›</span>
                <span>诗人×MBTI</span>
                <span>›</span>
                <span id="breadcrumbPoet"></span>
            </div>
            <div class="poet-detail-header">
                <div class="poet-detail-avatar" id="detailAvatar"></div>
                <div class="poet-detail-info">
                    <div class="poet-detail-code" id="detailCode"></div>
                    <h2 class="poet-detail-title" id="detailTitle"></h2>
                    <p class="poet-detail-desc" id="detailDesc"></p>
                </div>
            </div>
            <h3 class="mbti-section-title" id="mbtiSectionTitle"></h3>
            <div class="mbti-group-labels">
                <div class="mbti-group-label nt">🎯 分析家组 NT</div>
                <div class="mbti-group-label nf">🌱 外交家组 NF</div>
                <div class="mbti-group-label sj">🛡️ 守护者组 SJ</div>
                <div class="mbti-group-label sp">🎨 探险家组 SP</div>
            </div>
            <div class="mbti-grid" id="mbtiGrid"></div>
            <button class="back-btn" onclick="showHome()">← 返回全部诗人</button>
        </div>
    </div>

    <footer>
        <p>诗人 × MBTI 交叉解读 | 探索古典诗词与现代人格的奇妙碰撞</p>
    </footer>

    <script>
        // 诗人图片URL映射 (已全部替换为你本地的20张图片路径)
        const poetImages = {
            'LB-WILD': 'images/LB-WILD.jpg',
            'DF-EMO': 'images/DF-EMO.jpg',
            'SS-CHILL': 'images/SS-CHILL.jpg',
            'WW-ZEN': 'images/WW-ZEN.jpg',
            'LQZ-SASS': 'images/LQZ-SASS.jpg',
            'XQJ-FIGHT': 'images/XQJ-FIGHT.jpg',
            'BJY-WORK': 'images/BJY-WORK.jpg',
            'LSY-BE': 'images/LSY-BE.jpg',
            'TYM-FARM': 'images/TYM-FARM.jpg',
            'LZY-ALONE': 'images/LZY-ALONE.jpg',
            'LY-CAT': 'images/LY-CAT.jpg',
            'CC-BOSS': 'images/CC-BOSS.jpg',
            'MHR-FLAT': 'images/MHR-FLAT.jpg',
            'HZZ-SOCIAL': 'images/HZZ-SOCIAL.jpg',
            'DM-PLAY': 'images/DM-PLAY.jpg',
            'WAS-RULE': 'images/WAS-RULE.jpg',
            'YXJ-FREE': 'images/YXJ-FREE.jpg',
            'QY-SAD': 'images/QY-SAD.jpg',
            'NL-LOVE': 'images/NL-LOVE.jpg',
            'CS-HARD': 'images/CS-HARD.jpg'
        };

        // 诗人数据
        const poets = [
            { code: 'LB-WILD', name: '李白', mbti: 'ENFP', tags: ['先天反骨圣体', '职场整顿者'], desc: '他的诗里全是酒和月亮，但你知道他最厉害的是什么吗？是把皇帝都当陪衬的顶级自信。' },
            { code: 'DF-EMO', name: '杜甫', mbti: 'INFJ', tags: ['重度内耗专家', '操心命'], desc: '别人写诗是为了开心，他写诗是为了给苍生记账。房都被秋风吹破了还在想国家大事。' },
            { code: 'SS-CHILL', name: '苏轼', mbti: 'ENFP', tags: ['顶级乐天派', '荒野美食家'], desc: '被贬到哪儿，哪儿就是美食天堂。被关进监狱也能写出《赤壁赋》，这人心态绝了。' },
            { code: 'WW-ZEN', name: '王维', mbti: 'ISFP', tags: ['佛系青年', '大厂裸辞隐居者'], desc: '十五岁卷进职场，六十岁还在体制内，但他早就把禅意活成了日常。' },
            { code: 'LQZ-SASS', name: '李清照', mbti: 'ESTP', tags: ['千古第一拽姐', '清醒独立大女主'], desc: '赌书泼茶是浪漫，怼天怼地是日常。把酒喝到微醺还要写词diss前夫，这姐姐太飒了。' },
            { code: 'XQJ-FIGHT', name: '辛弃疾', mbti: 'ESTJ', tags: ['武德充沛', '六边形狂战士'], desc: '文能提笔安天下，武能上马定乾坤。就是脾气有点冲，看谁都不顺眼。' },
            { code: 'BJY-WORK', name: '白居易', mbti: 'ESFJ', tags: ['现实主义打工人', 'KPI狂魔'], desc: '写诗要写得老太能懂，做官要做到粉丝点赞。他可能是最早的流量明星。' },
            { code: 'LSY-BE', name: '李商隐', mbti: 'INFP', tags: ['BE美学大师', '究极谜语人'], desc: '他的诗美到让人窒息，但没人能搞清楚他在写什么。这就是朦胧诗派的顶流。' },
            { code: 'TYM-FARM', name: '陶渊明', mbti: 'ISFP', tags: ['归隐区UP主', '拒绝内卷第一人'], desc: '不为五斗米折腰？那是没被房贷逼过。他用一生证明：躺平也是门艺术。' },
            { code: 'LZY-ALONE', name: '柳宗元', mbti: 'INTJ', tags: ['孤寡老人', '独自美丽'], desc: '被贬到柳州，一个人也能把荒山变成景点。只是越孤独越有才华，越才华越孤独。' },
            { code: 'LY-CAT', name: '陆游', mbti: 'ISTJ', tags: ['重度猫奴', '意难平老兵'], desc: '一边写诗爱国，一边给猫写诗。王师北定中原日，记得先喂我的猫。' },
            { code: 'CC-BOSS', name: '曹操', mbti: 'ENTJ', tags: ['霸道总裁', '乱世枭雄'], desc: '别人是老板，他是老板中的老板。宁可我负天下人，不可天下人负我。' },
            { code: 'MHR-FLAT', name: '孟浩然', mbti: 'ISFP', tags: ['躺平鼻祖', '社交漏斗'], desc: '想当官但社恐，不当官但穷开心。他是第一个把佛系写进DNA的人。' },
            { code: 'HZZ-SOCIAL', name: '贺知章', mbti: 'ESFP', tags: ['四明狂客', '退休社牛老翁'], desc: '八十岁还能social全场，金龟换酒喝到断片。他是古代最有排面的退休老干部。' },
            { code: 'DM-PLAY', name: '杜牧', mbti: 'ESTP', tags: ['风流才子', '夜店小王子'], desc: '十年一觉扬州梦，赢得青楼薄幸名。他是古代夜生活的天花板。' },
            { code: 'WAS-RULE', name: '王安石', mbti: 'INTJ', tags: ['铁腕卷王', '变法狂人'], desc: '推行新法，怼遍天下。不是在卷，就是在卷的路上。司马光都拿他没办法。' },
            { code: 'YXJ-FREE', name: '鱼玄机', mbti: 'ENTP', tags: ['先锋女性', '精神独立者'], desc: '唐代最野的小姐姐，才华碾压一票男人，就是命有点苦。' },
            { code: 'QY-SAD', name: '屈原', mbti: 'INFJ', tags: ['究极理想主义', '精神洁癖'], desc: '举世皆浊我独清，众人皆醉我独醒。可惜没人听，最后只好去跳江。' },
            { code: 'NL-LOVE', name: '纳兰性德', mbti: 'INFP', tags: ['纯爱战神', '抑郁贵公子'], desc: '含着金汤匙出生，偏偏写词写到心碎。人生若只如初见，可惜初见即永远。' },

                'ISFP': { stars: 3, name: '艺术搭档', desc: '白居易虽然务实但也有艺术追求，ISFP也是。他俩凑一块可以聊聊诗词艺术，白居易能听听ISFP的审美视角，ISFP能感受白居易的通俗美学。' },
                'ESTP': { stars: 4, name: '社交高手', desc: '白居易和ESTP都是社交能力强的人，都爱交朋友都爱热闹。他俩凑一块那就是"派对动物"，今天喝酒明天社交，后天组织诗会。' },
                'ESFP': { stars: 5, name: '人气组合', desc: '白居易和ESFP在一起不无聊，两个人都是人群中的焦点。他俩凑一块能social到天亮，白居易负责诗词输出，ESFP负责气氛烘托，这种组合走到哪都是人气王。' }
            },
            'LSY-BE': {
                'INTJ': { stars: 3, name: '高深莫测', desc: '李商隐遇上INTJ，两个都是神秘人物。一个把感情写成谜语，一个把想法藏在脑子里。他俩凑一块那就是"加密通话现场"，普通人根本听不懂他们在交流什么。' },
                'INTP': { stars: 4, name: '学术谜语', desc: '李商隐写诗像在出谜题，INTP解谜像在做学术。他俩凑一块能进行一场"你猜我写的是什么意思"的极限拉扯。INTP的逻辑分析配上李商隐的朦胧美学，居然意外地合拍。' },
                'ENTJ': { stars: 2, name: '画风不同', desc: 'ENTJ要的是效率和结果，李商隐给的是谜语和眼泪。一个想搞清楚他在说啥，一个故意不让他搞清楚。这种组合，ENTJ会很抓狂。' },
                'ENTP': { stars: 4, name: '辩论搭档', desc: 'ENTP喜欢辩论，李商隐喜欢暧昧。ENTP想把李商隐的诗解读清楚，李商隐说"你永远猜不透我"。这种若即若离的关系，反而让ENTP欲罢不能。' },
                'INFJ': { stars: 5, name: '灵魂知己', desc: '李商隐和INFJ都是那种能看到事物本质的人，都追求深刻的情感连接。他俩凑一块能聊到灵魂深处，INFJ能读懂李商隐那些欲言又止的话，李商隐能感受到INFJ的理解。这种共鸣太难得了。' },
                'INFP': { stars: 5, name: '纯爱战士', desc: '李商隐和INFP都是爱情至上主义者，都能把感情写成一首诗。他俩凑一块那是"BE美学天花板"，一个负责写，一个负责哭。他俩的爱情观高度一致：爱过就够了，哪怕没有结果。' },
                'ENFJ': { stars: 3, name: '需要理解', desc: 'ENFJ想要直接的沟通，李商隐给的是委婉的表达。一个想搞清楚，一个故意模糊。他俩能相处，但ENFJ需要学会欣赏李商隐的朦胧美。' },
                'ENFP': { stars: 4, name: '浪漫邂逅', desc: '李商隐的诗配上ENFP的热情，那是浪漫与浪漫的碰撞。ENFP能感受到李商隐那些藏在谜语里的真心，李商隐能被ENFP的活力感染。他俩在一起，甜甜虐虐刚刚好。' },
                'ISTJ': { stars: 2, name: '互相不懂', desc: 'ISTJ想要清晰直接，李商隐给的是模糊暧昧。ISTJ会说"你到底想表达什么"，李商隐会说"你不懂我"。这俩人凑一块，那是鸡同鸭讲。' },
                'ISFJ': { stars: 3, name: '温柔守护', desc: 'ISFJ会默默陪伴李商隐，理解他的敏感和脆弱。虽然ISFJ可能不完全理解李商隐的诗意，但他们能给予足够的温暖和支持。ISFJ的包容是李商隐的安全感来源。' },
                'ESTJ': { stars: 2, name: '不在频道', desc: 'ESTJ务实直接，李商隐浪漫朦胧。一个要结果，一个要过程；一个讲效率，一个讲感觉。这俩人完全不在一个维度，相处起来会很累。' },
                'ESFJ': { stars: 3, name: '需要调频', desc: 'ESFJ热情友好但不太懂浪漫，李商隐浪漫至死但不善社交。他俩能相处，但需要慢慢理解对方的世界。ESFJ学着欣赏李商隐的诗意，李商隐学着接受ESFJ的直接。' },
                'ISTP': { stars: 4, name: '酷哥美学', desc: '李商隐和ISTP都是那种不太爱解释的人，都活在自己的世界里。ISTP能欣赏李商隐的美学，李商隐能理解ISTP的酷。他俩凑一块不需要多话，沉默也是一种交流。' },
                'ISFP': { stars: 5, name: '美学搭档', desc: '李商隐和ISFP都是审美满分的人，都追求艺术的极致。他俩凑一块能一起探索美、感受美、创造美。李商隐的诗意配ISFP的视觉，那是灵魂层面的契合。' },
                'ESTP': { stars: 3, name: '反差萌', desc: '李商隐是忧郁小王子，ESTP是阳光大男孩。这种反差有时候很有趣——ESTP想拉李商隐出门浪，李商隐想拉ESTP一起emo。他俩在一起，悲喜交加。' },
                'ESFP': { stars: 4, name: '治愈系', desc: 'ESFP的热情能照亮李商隐的忧郁，让他暂时忘记那些伤感的事。李商隐的深沉能让ESFP感受生活的另一面。他俩在一起，那是"一边流泪一边跳舞"的组合。' }
            },
            'TYM-FARM': {
                'INTJ': { stars: 4, name: '躺平哲学', desc: '陶渊明和INTJ都是爱思考的人，只是思考的方向不同——一个思考怎么种地，一个思考怎么改变世界。但他俩凑一块能聊"从宇宙真理到田园生活"的哲学话题，意外地合拍。' },
                'INTP': { stars: 4, name: '研究搭档', desc: '陶渊明种田，INTP研究原理。两个人都是爱钻研的人，只是领域不同。INTP能帮陶渊明分析土壤成分，陶渊明能让INTP体验"晨兴理荒秽"的快乐。' },
                'ENTJ': { stars: 2, name: '人生分歧', desc: '陶渊明想过归隐生活，ENTJ想让他出来搞事业。一个要躺平，一个要卷起；一个想当农民，一个想当领导。ENTJ会被陶渊明的"不为五斗米折腰"气到无语。' },
                'ENTP': { stars: 3, name: '佛系辩论', desc: 'ENTP想拉陶渊明出来辩论，陶渊明说"不如一起种豆南山下"。ENTP的热情碰上陶渊明的淡定，就像一拳打在棉花上。但ENTP久了也会被这种peace感染。' },
                'INFJ': { stars: 5, name: '精神契合', desc: '陶渊明和INFJ都是理想主义者，都追求内心的平静与自由。他俩凑一块可以聊人生聊理想，从诗词歌赋聊到人生哲学。INFJ能理解陶渊明"采菊东篱下"的超脱，陶渊明能感受到INFJ的共鸣。' },
                'INFP': { stars: 5, name: '浪漫归隐', desc: '陶渊明和INFP都是浪漫主义者，都向往诗和远方。他俩凑一块那就是"归隐田园梦"的终极版本，一起种菜一起写诗一起看星星，岁月静好到不真实。' },
                'ENFJ': { stars: 2, name: '频道不同', desc: 'ENFJ想要影响力，陶渊明想要自由。ENFJ的热情对陶渊明来说有点太过刺激，陶渊明的淡定对ENFJ来说有点不求上进。但ENFJ如果能理解陶渊明的选择，他俩也能成为朋友。' },
                'ENFP': { stars: 4, name: '田园诗人', desc: '陶渊明和ENFP都是热爱自由的人，都向往简单的生活。ENFP会被陶渊明的归隐生活吸引，陶渊明会觉得ENFP的热情很可爱。他俩凑一块能把普通的日子过成诗。' },
                'ISTJ': { stars: 4, name: '岁月静好', desc: '陶渊明和ISTJ都是安安静静过日子的人，都追求稳定和规律。他俩凑一块可以一起种菜一起喝茶，过着"日出而作日落而息"的田园生活。这种peace，正是两个人都想要的。' },
                'ISFJ': { stars: 5, name: '温馨田园', desc: 'ISFJ会照顾陶渊明的日常起居，陶渊明会给ISFJ带来心灵的平静。他俩的组合是"男主外女主内"的田园版本，只是这里没有内外之分，只有岁月静好。' },
                'ESTJ': { stars: 2, name: '理念冲突', desc: 'ESTJ想要KPI，陶渊明只想种田。一个要效率，一个要自由；一个要成果，一个要peace。ESTJ会觉得陶渊明太懒，陶渊明会觉得ESTJ太累。' },
                'ESFJ': { stars: 3, name: '需要适应', desc: 'ESFJ的热情社交和陶渊明的安静归隐有点冲突。ESFJ想让陶渊明多social，陶渊明想一个人种种菜。但如果ESFJ能接受这种生活方式，他俩也能和谐相处。' },
                'ISTP': { stars: 5, name: '田园兄弟', desc: '陶渊明和ISTP都是享受简单生活的人，都不喜欢复杂的人际关系。他俩凑一块那是"隐居山林二人组"，一起种田一起砍柴一起享受大自然的美好。这种友谊简单纯粹。' },
                'ISFP': { stars: 5, name: '艺术田园', desc: '陶渊明和ISFP都是审美满分的人，都追求生活的艺术。他俩凑一块可以把田园生活过成诗，ISFP负责发现美，陶渊明负责记录美。这种日子，简单又精致。' },
                'ESTP': { stars: 2, name: '画风不合', desc: 'ESTP爱冒险爱刺激，陶渊明想过安静日子。一个要浪，一个要稳；一个追求刺激，一个追求peace。ESTP会把陶渊明拉出舒适区，陶渊明会把ESTP拉回田间地头。' },
                'ESFP': { stars: 3, name: '需要平衡', desc: 'ESFP想让陶渊明多出去浪，陶渊明想在家种种菜养养花。他俩需要找到平衡点——偶尔一起出去high，大部分时间各自安好。这种关系需要双方都做出让步。' }
            },
            'LZY-ALONE': {
                'INTJ': { stars: 5, name: '孤独智者', desc: '柳宗元和INTJ都是享受独处的人，都喜欢深度思考。两个人都是"孤独但不寂寞"的类型，凑一块不需要social，只要一起看书一起发呆就很满足。INTJ能理解柳宗元的孤高，柳宗元能欣赏INTJ的睿智。' },
                'INTP': { stars: 5, name: '学术知己', desc: '柳宗元和INTP都是爱研究的人，都喜欢在知识的海洋里遨游。他俩凑一块能聊哲学聊历史聊文学，聊到天黑都不带停的。这种精神层面的交流，对两个人来说都是享受。' },
                'ENTJ': { stars: 2, name: '不合拍', desc: '柳宗元喜欢安静独处，ENTJ喜欢指挥全场。一个要孤独，一个要热闹；一个想躲起来，一个想拉他出来搞事业。这种组合，相处起来会很累。' },
                'ENTP': { stars: 3, name: '若即若离', desc: 'ENTP想拉柳宗元出来浪，柳宗元说"我想一个人待着"。ENTP的热情碰上柳宗元的冷淡，就像一阵风刮过湖面，激不起一点涟漪。但如果ENTP能接受柳宗元的独处模式，他俩也能相处。' },
                'INFJ': { stars: 4, name: '灵魂共鸣', desc: '柳宗元和INFJ都是内心世界丰富的人，都不善于表达自己。他俩凑一块能聊人生聊理想，INFJ能读懂柳宗元那些藏在文字里的孤独，柳宗元能感受到INFJ的理解。这种默契很难得。' },
                'INFP': { stars: 4, name: '文艺孤星', desc: '柳宗元和INFP都是孤独的文艺青年，都习惯一个人思考一个人感慨。他俩凑一块可以一起写诗一起感慨，"千山鸟飞绝，万径人踪灭"配"孤独是成长的必经之路"，简直是绝配。' },
                'ENFJ': { stars: 2, name: '需要空间', desc: 'ENFJ想要社交和连接，柳宗元想要独处和安静。ENFJ的热情对柳宗元来说有点负担，柳宗元的冷淡对ENFJ来说有点受伤。他俩需要给对方足够的空间才能和谐相处。' },
                'ENFP': { stars: 3, name: '被动社交', desc: 'ENFP想带柳宗元去浪，柳宗元更想一个人待着。但ENFP的热情有时候能打动柳宗元，让他偶尔走出孤独感受一下热闹。这种组合需要ENFP更多的耐心。' },
                'ISTJ': { stars: 4, name: '安静陪伴', desc: '柳宗元和ISTJ都是不爱说话的人，相处模式简单直接。ISTJ不会强迫柳宗元社交，柳宗元也会欣赏ISTJ的可靠。他俩凑一块那是"岁月静好"的标配。' },
                'ISFJ': { stars: 4, name: '温柔守护', desc: 'ISFJ会默默照顾柳宗元，理解他的孤僻和敏感。ISFJ不会强迫柳宗元社交，只会在旁边默默陪伴。柳宗元能感受到ISFJ的温暖，ISFJ能理解柳宗元的独特。' },
                'ESTJ': { stars: 2, name: '互相看不惯', desc: 'ESTJ觉得柳宗元太消极，柳宗元觉得ESTJ太功利。一个要行动，一个要安静；一个要效率，一个要独处。这俩人凑一块，那是互相看不顺眼。' },
                'ESFJ': { stars: 2, name: '社恐vs社牛', desc: 'ESFJ爱社交，柳宗元爱独处。ESFJ想让柳宗元多交朋友，柳宗元想一个人静静。他俩能相处，但需要ESFJ学会尊重柳宗元的边界，给他足够的独处空间。' },
                'ISTP': { stars: 5, name: '独行侠联盟', desc: '柳宗元和ISTP都是独行侠，都不爱解释都不爱social。他俩凑一块不需要言语，只要一起发呆一起看风景就很舒服。ISTP能理解柳宗元的孤独，柳宗元能欣赏ISTP的酷。' },
                'ISFP': { stars: 4, name: '艺术孤品', desc: '柳宗元和ISFP都是艺术气质满满的人，都追求内心的纯粹。他俩凑一块可以一起创作一起发呆，柳宗元的文采配ISFP的审美，那是孤独者的艺术盛宴。' },
                'ESTP': { stars: 2, name: '磁场不合', desc: 'ESTP爱浪爱热闹，柳宗元爱静爱独处。一个要刺激，一个要peace；一个在派对上high到爆，一个在家里看书发呆。他俩凑一块，ESTP会觉得柳宗元太无聊。' },
                'ESFP': { stars: 3, name: '需要磨合', desc: 'ESFP的热情和柳宗元的冷淡形成鲜明对比。ESFP想让柳宗元开朗点，柳宗元想一个人静静。但偶尔的相处也能带来一些火花——ESFP能拉柳宗元体验一下生活的另一面。' }
            },
            'LY-CAT': {
                'INTJ': { stars: 4, name: '规划型人格', desc: '陆游和INTJ都是有自己的原则和规划的人，都不轻易妥协。陆游爱国，INTJ也爱国，只是表达方式不同。他俩凑一块能聊国家大事聊军事策略，从诗词歌赋聊到天下苍生。' },
                'INTP': { stars: 4, name: '学者气质', desc: '陆游虽然是个武将但其实很有文人气质，INTP虽然是学者但也有自己的坚持。他俩凑一块能聊诗词聊历史聊哲学，INTP能欣赏陆游的才情，陆游能理解INTP的执着。' },
                'ENTJ': { stars: 4, name: '家国情怀', desc: '陆游和ENTJ都是想干大事的人，都有强烈的家国情怀。他俩凑一块不是在讨论北伐就是在策划收复失地，两个人的爱国热情碰撞在一起，火花四溅。' },
                'ENTP': { stars: 3, name: '辩论搭档', desc: '陆游和ENTP都是嘴上功夫了得的人，都有自己的观点要表达。他俩凑一块能辩论国家大事，从政治聊到军事聊到诗词，ENTP负责提出问题，陆游负责慷慨激昂地回答。' },
                'INFJ': { stars: 5, name: '精神伴侣', desc: '陆游和INFJ都是理想主义者，都为国家的前途担忧。他俩凑一块能聊人生聊理想聊未来，INFJ能理解陆游的执着，陆游能感受INFJ的深沉。两个忧国忧民的人在一起，互相取暖。' },
                'INFP': { stars: 4, name: '浪漫主义', desc: '陆游虽然是个硬汉但也有柔软的一面，INFP也是。他俩凑一块能聊诗词聊理想聊人生，陆游的豪放配INFP的婉约，刚好互补。' },
                'ENFJ': { stars: 4, name: '激励大师', desc: 'ENFJ能激励陆游的爱国热情，让他的北伐梦想更有动力。ENFJ的感染力配上陆游的执着，那是双倍的热情。他俩在一起，能感染周围的人一起关注国家大事。' },
                'ENFP': { stars: 4, name: '热血组合', desc: '陆游和ENFP都是热情似火的人，都有理想都有抱负。他俩凑一块不是在聊爱国就是在聊诗词，ENFP能被陆游的执着感动，陆游能被ENFP的热情点燃。' },
                'ISTJ': { stars: 5, name: '最佳拍档', desc: '陆游和ISTJ都是靠谱的人，都有自己的原则和坚持。ISTJ能帮陆游稳定后方，陆游能让ISTJ感受热血。一个理性一个感性，一个务实一个理想，绝配。' },
                'ISFJ': { stars: 4, name: '温柔支持', desc: 'ISFJ会默默支持陆游的理想，照顾好家庭让他没有后顾之忧。陆游在外为理想奋斗，ISFJ在家守护温暖。这种组合很传统但很稳定。' },
                'ESTJ': { stars: 4, name: '执行力强', desc: '陆游和ESTJ都是行动派，都讲究效率。他俩凑一块不是在搞事业就是在策划搞事业，ESTJ负责管理，陆游负责执行，配合默契。' },
                'ESFJ': { stars: 4, name: '家庭温暖', desc: 'ESFJ能让陆游感受到家庭的温暖，让他知道有人支持他。ESFJ的热情和照顾能让陆游在为国家奋斗的同时也有一个温暖的港湾。' },
                'ISTP': { stars: 4, name: '硬汉联盟', desc: '陆游和ISTP都是硬汉，都有武士精神。他俩凑一块可以讨论武艺讨论战术，ISTP能欣赏陆游的剑法，陆游能理解ISTP的冷静。两个不爱废话的人，友谊简单直接。' },
                'ISFP': { stars: 4, name: '反差萌', desc: '陆游是个硬汉但爱猫，ISFP是艺术型但也有温柔的一面。他俩凑一块，陆游给ISFP讲军事，ISFP给陆游看猫片。这种反差萌，很有喜感。' },
                'ESTP': { stars: 4, name: '冒险精神', desc: '陆游和ESTP都有冒险精神，都敢想敢做。陆游想北伐收复失地，ESTP想闯出一片天。他俩凑一块，要么是在策划大事，要么是在执行大事的路上。' },

                'ENTP': { stars: 5, name: '辩论大师', desc: '曹操和ENTP都是嘴上功夫了得的人，都不轻易服输。他俩凑一块那就是"辩论界的华山论剑"，从政治聊到军事聊到人生，ENTP出招曹操拆招，精彩绝伦。' },
                'INFJ': { stars: 3, name: '复杂关系', desc: '曹操是实用主义者，INFJ是理想主义者。一个讲现实，一个讲情怀；一个要结果，一个要意义。但INFJ能看清曹操的野心和格局，曹操能欣赏INFJ的深度。' },
                'INFP': { stars: 2, name: '不太搭', desc: '曹操务实直接，INFP浪漫敏感。一个在战场上杀伐决断，一个在诗词里感慨人生。他俩的价值观差异太大，相处起来会有摩擦。' },
                'ENFJ': { stars: 4, name: '领袖气质', desc: '曹操和ENFJ都有领袖魅力，都能激励人心。ENFJ用情怀感染人，曹操用实力征服人。他俩凑一块那是"魅力双响炮"，走到哪都是焦点。' },
                'ENFP': { stars: 4, name: '野心勃勃', desc: '曹操和ENFP都有野心，都有感染力。ENFP用热情感染人，曹操用魄力征服人。他俩凑一块能点燃一群人的激情，共同追求远大的目标。' },
                'ISTJ': { stars: 4, name: '君臣配合', desc: '曹操和ISTJ的组合是"老板+得力干将"的标配。ISTJ负责执行细节，曹操负责把握大局；ISTJ稳重可靠，曹操果断决策。这种配合很高效。' },
                'ISFJ': { stars: 3, name: '需要适应', desc: '曹操霸道，ISFJ温柔。一个要征服世界，一个要照顾身边人。曹操欣赏ISFJ的忠诚，ISFJ需要适应曹操的强势。这种关系需要双方都做出调整。' },
                'ESTJ': { stars: 5, name: '霸道总裁', desc: '曹操和ESTJ都是强势领导，都有超强的执行力。他俩凑一块那是"卷王之王"组合，不是你在卷就是我在卷，工作效率高到可怕。他俩的管理风格也很像：强势、直接、结果导向。' },
                'ESFJ': { stars: 3, name: '管理达人', desc: '曹操和ESFJ都善于管理人，只是方式不同。曹操用魄力征服，ESFJ用人情管理。他俩能一起组建高效的团队，曹操定方向，ESFJ抓落实。' },

                'ESTP': { stars: 5, name: '冒险搭档', desc: '曹操和ESTP都是敢于冒险的人，都敢想敢做。ESTP负责冲锋陷阵，曹操负责统筹全局。他俩凑一块那是"乱世双雄"，在战场上无人能敌。' },

            'MHR-FLAT': {

                'ENFP': { stars: 3, name: '需要平衡', desc: 'ENFP爱浪爱热闹，孟浩然想安静想躺平。ENFP想带孟浩然出门，孟浩然想拉ENFP一起发呆。他俩能相处，但需要找到平衡点。' },

                'ESFJ': { stars: 3, name: '需要适应', desc: 'ESFJ爱社交爱热闹，孟浩然想安静想独处。ESFJ想让孟浩然多交朋友，孟浩然想让ESFJ接受他的佛系。他俩能相处，但需要双方都做出让步。' },

            'DM-PLAY': {

                'ESFJ': { stars: 4, name: '人气组合', desc: 'ESFJ能让岑参感受到家的温暖，岑参能给ESFJ带来刺激的故事。他俩凑一块那是"冒险家+后勤部长"的组合，配合默契。' },
                'ISTP': { stars: 5, name: '硬汉联盟', desc: '岑参和ISTP都是硬汉，都爱冒险都爱极限运动。他俩凑一块那是"极限运动二人组"，岑参写诗记录刺激，ISTP负责技术分析。' },
                'ISFP': { stars: 4, name: '艺术边塞', desc: '岑参写诗记录边塞风光，ISFP能欣赏能共鸣。他俩凑一块能从诗词聊到审美，岑参的经历配上ISFP的视角，那是边塞美学的完美呈现。' },
                'ESTP': { stars: 5, name: '冒险兄弟', desc: '岑参和ESTP都是冒险家，都敢想敢做敢当。他俩凑一块那是"边塞特种兵"的组合，今天爬雪山明天过大漠，一路刺激一路嗨。' },
                'ESFP': { stars: 5, name: '派对边塞', desc: '岑参和ESFP都是爱热闹的人，都能high能浪。他俩凑一块能把边塞的艰苦生活过成诗，ESFP负责嗨，岑参负责记录，好不快活。' }
            }
        };

        // 生成星级显示
        function generateStars(count) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < count) {
                    stars += '<span class="star">★</span>';
                } else {
                    stars += '<span class="empty">☆</span>';
                }
            }
            return stars;
        }

        // 获取MBTI分组
        function getMBTIGroup(type) {
            const second = type[1];
            if (second === 'N') return 'nt';
            if (second === 'F') return 'nf';
            if (second === 'S') {
                return type[2] === 'J' ? 'sj' : 'sp';
            }
            return 'sp';
        }

        // 渲染首页
        function renderHomePage() {
            const grid = document.getElementById('poetsGrid');
            grid.innerHTML = poets.map(poet => {
                const imageUrl = poetImages[poet.code];
                return `
                    <div class="poet-card" onclick="showDetail('${poet.code}')">
                        <div class="poet-avatar">
                            ${imageUrl ? `<img src="${imageUrl}" alt="${poet.name}" onerror="this.parentElement.innerHTML='<div class=\\'avatar-placeholder\\' style=\\'background: linear-gradient(135deg, var(--accent-red), var(--accent-gold))\\'>${poet.code.substring(0,2)}</div>'">` : `<div class="avatar-placeholder" style="background: linear-gradient(135deg, var(--accent-red), var(--accent-gold))">${poet.code.substring(0,2)}</div>`}
                        </div>
                        <div class="poet-code">${poet.mbti} · ${poet.code}</div>
                        <div class="poet-name">${poet.name}</div>
                        <div class="poet-tags">
                            ${poet.tags.map(tag => `<span class="poet-tag">${tag}</span>`).join('')}
                        </div>
                        <button class="view-btn">16 种 MBTI 组合 →</button>
                    </div>
                `;
            }).join('');
        }

        // 显示详情页
        function showDetail(poetCode) {
            const poet = poets.find(p => p.code === poetCode);
            if (!poet) return;

            // 更新面包屑
            document.getElementById('breadcrumbPoet').textContent = `${poet.code}（${poet.name}）`;

            // 更新头部信息
            const imageUrl = poetImages[poet.code];
            document.getElementById('detailAvatar').innerHTML = imageUrl 
                ? `<img src="${imageUrl}" alt="${poet.name}" onerror="this.parentElement.innerHTML='<div class=\\'avatar-placeholder\\' style=\\'background: linear-gradient(135deg, var(--accent-red), var(--accent-gold)); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #fff;\\'>${poet.code.substring(0,2)}</div>'">` 
                : `<div class="avatar-placeholder" style="background: linear-gradient(135deg, var(--accent-red), var(--accent-gold)); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #fff;">${poet.code.substring(0,2)}</div>`;
            document.getElementById('detailCode').textContent = `${poet.mbti} · ${poet.code}`;
            document.getElementById('detailTitle').textContent = `${poet.name}（${poet.code}）的 MBTI 交叉解读`;
            document.getElementById('detailDesc').textContent = poet.desc;
            document.getElementById('mbtiSectionTitle').textContent = `${poet.code}（${poet.name}）的 16 种 MBTI 组合`;

            // 渲染MBTI卡片
            const poetData = crossAnalysis[poetCode];
            const mbtiGrid = document.getElementById('mbtiGrid');
            mbtiGrid.innerHTML = mbtiTypes.map(mbti => {
                const data = poetData[mbti.type];
                const group = getMBTIGroup(mbti.type);
                return `
                    <div class="mbti-card ${group}">
                        <div class="mbti-card-header">
                            <div class="mbti-card-title">${poet.code} <span>×</span> ${mbti.type}</div>
                            <div class="mbti-stars">${generateStars(data.stars)}</div>
                        </div>
                        <div class="mbti-combo-name">${data.name}</div>
                        <div class="mbti-combo-desc">${data.desc}</div>
                    </div>
                `;
            }).join('');

            // 切换页面
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('detailPage').classList.add('active');
            window.scrollTo(0, 0);
        }

        // 返回首页
        function showHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('detailPage').classList.remove('active');
            window.scrollTo(0, 0);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderHomePage();
        });
    </script>
</body>
</html>
